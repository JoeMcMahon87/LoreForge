{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "World Settings" %} — LoreForge{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto py-8">
  <h1 class="text-2xl font-bold text-gray-900 mb-6">{% trans "World Settings" %}</h1>

  <form method="post" enctype="multipart/form-data" class="space-y-5" novalidate>
    {% csrf_token %}

    <div>
      <label for="{{ form.name.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">
        {% trans "World Name" %} <span aria-hidden="true" class="text-red-500">*</span>
      </label>
      <input type="text" name="{{ form.name.html_name }}" id="{{ form.name.id_for_label }}"
             value="{{ form.name.value|default:'' }}"
             class="block w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500
               {% if form.name.errors %}border-red-400{% endif %}"
             {% if form.name.errors %}aria-describedby="name-error"{% endif %}
             required>
      {% if form.name.errors %}
        <p id="name-error" class="text-red-600 text-xs mt-1" role="alert">{{ form.name.errors|join:", " }}</p>
      {% endif %}
    </div>

    <div>
      <label for="{{ form.tagline.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">
        {% trans "Tagline" %}
      </label>
      <input type="text" name="{{ form.tagline.html_name }}" id="{{ form.tagline.id_for_label }}"
             value="{{ form.tagline.value|default:'' }}"
             class="block w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
    </div>

    <div>
      <label for="{{ form.description.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">
        {% trans "Description" %}
      </label>
      <textarea name="{{ form.description.html_name }}" id="{{ form.description.id_for_label }}"
                rows="4"
                class="block w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">{{ form.description.value|default:'' }}</textarea>
    </div>

    <div>
      <label for="{{ form.theme_color.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">
        {% trans "Theme Color" %}
      </label>
      <input type="color" name="{{ form.theme_color.html_name }}" id="{{ form.theme_color.id_for_label }}"
             value="{{ form.theme_color.value|default:'#4f46e5' }}"
             class="h-9 w-16 cursor-pointer border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-indigo-500">
    </div>

    <div>
      <label for="{{ form.logo.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">
        {% trans "Logo" %}
      </label>
      <input type="file" name="{{ form.logo.html_name }}" id="{{ form.logo.id_for_label }}"
             accept="image/*"
             class="block text-sm text-gray-600">
    </div>

    <div class="flex gap-3">
      <button type="submit"
              class="px-4 py-2 bg-indigo-600 text-white text-sm font-medium rounded hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
        {% trans "Save Settings" %}
      </button>
    </div>
  </form>
</div>
{% endblock %}
