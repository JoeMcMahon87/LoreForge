{% load i18n %}
<div>
  <label for="{{ form.title.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">
    {% trans "Title" %} <span aria-hidden="true" class="text-red-500">*</span>
  </label>
  <input type="text" name="{{ form.title.html_name }}" id="{{ form.title.id_for_label }}"
         value="{{ form.title.value|default:'' }}"
         class="block w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500{% if form.title.errors %} border-red-400{% endif %}"
         {% if form.title.errors %}aria-describedby="title-error"{% endif %}
         required>
  {% if form.title.errors %}
    <p id="title-error" class="text-red-600 text-xs mt-1" role="alert">{{ form.title.errors|join:", " }}</p>
  {% endif %}
</div>

<div>
  <label for="{{ form.content.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">
    {% trans "Content" %}
  </label>
  <textarea name="{{ form.content.html_name }}" id="{{ form.content.id_for_label }}"
            rows="6"
            class="block w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">{{ form.content.value|default:'' }}</textarea>
</div>

<div>
  <label for="{{ form.visibility.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">
    {% trans "Visibility" %}
  </label>
  <select name="{{ form.visibility.html_name }}" id="{{ form.visibility.id_for_label }}"
          class="block w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
    {% for value, label in form.fields.visibility.choices %}
      <option value="{{ value }}" {% if form.visibility.value == value %}selected{% endif %}>{{ label }}</option>
    {% endfor %}
  </select>
</div>

<div>
  <label for="{{ form.tags.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">
    {% trans "Tags" %}
  </label>
  {{ form.tags }}
</div>
