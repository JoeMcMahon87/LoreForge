{% load i18n %}
<section class="mb-6" aria-labelledby="campaigns-heading">
  <h2 id="campaigns-heading" class="text-xl font-bold text-gray-900 mb-3">{% trans "Campaigns" %}</h2>
  {% if campaigns %}
    <ul class="space-y-2" role="list">
      {% for campaign in campaigns %}
        <li>
          <a href="{% url 'campaign-detail' campaign_slug=campaign.slug %}"
             class="flex items-center gap-3 p-3 bg-white border border-gray-200 rounded-lg hover:border-indigo-400 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <span class="font-medium text-gray-900">{{ campaign.name }}</span>
            <span class="ml-auto px-2 py-0.5 rounded-full text-xs font-medium
              {% if campaign.status == 'active' %}bg-green-100 text-green-700
              {% elif campaign.status == 'complete' %}bg-gray-100 text-gray-600
              {% else %}bg-yellow-100 text-yellow-700{% endif %}">
              {{ campaign.get_status_display }}
            </span>
          </a>
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <p class="text-gray-500 text-sm">{% trans "No campaigns yet." %}</p>
  {% endif %}
</section>
